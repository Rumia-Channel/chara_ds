<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chara_ds — Dialogue Generation Progress</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand">chara_ds</span>
      <span class="dot" id="status-dot"></span>
      <span class="status-text" id="status-text">loading…</span>
    </div>
    <div class="topbar-mid">
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">— / —</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="meta" id="meta-workers">workers: —</span>
      <span class="meta" id="meta-out">out: —</span>
      <span class="meta" id="meta-updated">updated: —</span>
      <span class="control-badge" id="control-badge"></span>
      <div class="control-buttons">
        <button id="btn-pause" class="ctrl-btn" title="Pause new conversations">⏸ Pause</button>
        <button id="btn-resume" class="ctrl-btn" title="Resume" hidden>▶ Resume</button>
        <button id="btn-stop" class="ctrl-btn ctrl-danger" title="Stop after current conversations finish">⏹ Stop</button>
      </div>
      <label class="pause-toggle" title="Pause UI auto-refresh only">
        <input type="checkbox" id="ui-pause-toggle"> ui pause
      </label>
    </div>
  </header>

  <main class="layout">
    <section class="col col-active">
      <div class="section-head">
        <h2>Active conversations</h2>
        <span class="count" id="active-count">0</span>
      </div>
      <div id="active-list" class="active-list"></div>
    </section>

    <section class="col col-timeline">
      <div class="section-head">
        <h2>Public timeline</h2>
        <div class="timeline-controls">
          <select id="timeline-select" class="timeline-select" title="Select conversation">
            <option value="__latest__">Latest update</option>
          </select>
          <span class="count" id="timeline-count">0</span>
        </div>
      </div>
      <div id="timeline" class="timeline"></div>
    </section>

    <section class="col col-detail">
      <div class="tabs">
        <button class="tab active" data-tab="actor">Actor</button>
        <button class="tab" data-tab="guard">Guard</button>
        <button class="tab" data-tab="controller">Controller</button>
        <button class="tab" data-tab="persona">Persona</button>
        <button class="tab" data-tab="queue">Queue <span class="badge" id="queue-badge">0</span></button>
        <button class="tab" data-tab="completed">Completed <span class="badge" id="completed-badge">0</span></button>
        <button class="tab" data-tab="events">Events</button>
        <button class="tab" data-tab="errors">Errors <span class="badge" id="errors-badge">0</span></button>
      </div>
      <div class="tab-panes">
        <div class="tab-pane active agent-pane" id="pane-actor"></div>
        <div class="tab-pane agent-pane" id="pane-guard"></div>
        <div class="tab-pane agent-pane" id="pane-controller"></div>
        <div class="tab-pane agent-pane" id="pane-persona"></div>
        <div class="tab-pane" id="pane-queue">
          <div class="queue-toolbar">
            <button id="queue-refresh" class="ctrl-btn">⟳ Refresh</button>
            <label class="queue-filter">
              <input type="checkbox" id="queue-hide-consumed"> hide already-picked
            </label>
            <span class="queue-info" id="queue-info">—</span>
          </div>
          <div class="queue-add">
            <textarea id="queue-add-text" rows="2" placeholder="新しいシチュエーション (1 行)"></textarea>
            <button id="queue-add-btn" class="ctrl-btn">＋ Add</button>
          </div>
          <div id="queue-list" class="queue-list"></div>
        </div>
        <div class="tab-pane" id="pane-completed">
          <div class="completed-toolbar">
            <button id="completed-refresh" class="ctrl-btn">⟳ Refresh</button>
            <label>order
              <select id="completed-order">
                <option value="desc" selected>newest first</option>
                <option value="asc">oldest first</option>
              </select>
            </label>
            <label>page size
              <select id="completed-limit">
                <option>20</option>
                <option selected>50</option>
                <option>100</option>
                <option>200</option>
              </select>
            </label>
            <span class="completed-info" id="completed-info">—</span>
            <span class="completed-pager">
              <button id="completed-prev" class="ctrl-btn">‹ prev</button>
              <button id="completed-next" class="ctrl-btn">next ›</button>
            </span>
          </div>
          <div id="completed-list" class="completed-list"></div>
          <div id="completed-detail" class="completed-detail" hidden></div>
        </div>
        <div class="tab-pane" id="pane-events"></div>
        <div class="tab-pane" id="pane-errors"></div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
